name: publish

# Trigger: push a tag `v1.0.0-beta.2` (etc.). Tag must already be created
# locally via `node scripts/release.mjs <bump> --tag` then `git push --tags`.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # needed if/when we switch to npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm test

      - name: Determine dist-tag
        id: tag
        run: |
          REF_NAME="${GITHUB_REF_NAME}"
          if [[ "$REF_NAME" == *-* ]]; then
            # v1.0.0-beta.2 → beta
            DIST_TAG=$(echo "$REF_NAME" | sed -E 's/^v[0-9]+\.[0-9]+\.[0-9]+-([A-Za-z]+).*/\1/')
          else
            DIST_TAG=latest
          fi
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"

      - name: Publish @reley/* in dep order
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in packages/shared packages/core packages/core-cli; do
            echo "▸ publishing $pkg"
            (cd "$pkg" && pnpm publish --access public --tag "${{ steps.tag.outputs.dist_tag }}" --no-git-checks)
          done
